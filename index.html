<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pure Random Site Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-color);
        }

        h1 span {
            color: var(--accent-color);
        }

        .btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #475569;
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
            position: relative;
        }

        .panel:last-child {
            border-right: none;
        }

        .panel-header {
            background-color: #1e293b80;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        textarea {
            width: 100%;
            height: 100%;
            background-color: #020617;
            color: #34d399;
            font-family: 'Courier New', Courier, monospace;
            padding: 1rem;
            border: none;
            resize: none;
            outline: none;
            font-size: 0.9rem;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>Random <span>Site Generator</span></h1>
        <button class="btn" onclick="generateRandomWebsite()">🎲 Generate New Site</button>
    </header>

    <div class="main-container">
        <div class="panel">
            <div class="panel-header">
                <span>Source Code (HTML/CSS)</span>
                <button class="btn btn-secondary" onclick="copyCode()">Copy Code</button>
            </div>
            <textarea id="codeViewer" readonly placeholder="Click 'Generate New Site' to build something..."></textarea>
        </div>

        <div class="panel">
            <div class="panel-header">Live Preview</div>
            <iframe id="previewWindow"></iframe>
        </div>
    </div>

    <audio id="masterAudioPlayer"></audio>

    <script>
        // -------------------------------------------------------------
        // CONFIGURATION: Paste your GitHub Username and Repository name here!
        // -------------------------------------------------------------
        const GITHUB_USERNAME = "YOUR_USERNAME";
        const REPO_NAME = "YOUR_REPO_NAME";
        // -------------------------------------------------------------

        const words = ["Quantum", "Glitch", "Matrix", "Cyber", "Void", "Omega", "Hyper", "Alpha", "Delta", "Turbo", "Cosmic", "Phantom", "Solar", "Static", "Cryptic"];
        const nouns = ["Portal", "System", "Node", "Network", "Beacon", "Core", "Module", "Vortex", "Grid", "Terminal", "Buffer", "Array", "Engine", "Console"];
        const phrases = [
            "System calibration is currently underway.",
            "Do not close this window until the download finishes.",
            "Data stream injection has reached maximum capacity.",
            "Welcome to the fallback terminal node.",
            "Unidentified protocols have been successfully initiated."
        ];
        const fonts = ["Arial", "Courier New", "Impact", "Georgia", "Comic Sans MS"];

        function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function randRange(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function randColor() { return `hsl(${randRange(0, 360)}, ${randRange(50, 95)}%, ${randRange(30, 70)}%)`; }

        function generateRandomWebsite() {
            const headingColor = randColor();
            const textColor = randColor();
            const panelBg = randColor();
            const mainBg = randColor();
            const selectedFont = rand(fonts);
            const siteTitle = `${rand(words)} ${rand(nouns)}`;
            
            let structuralContent = `
                <h1 style="color: ${headingColor}; font-size: ${randRange(2, 4)}rem; margin-bottom: 15px;">${siteTitle}</h1>
                <p style="color: ${textColor}; font-size: 1.1rem; margin-bottom: 25px;">${rand(phrases)}</p>
            `;

            // 1/2 Chance of input text box appearing
            if (Math.random() < 0.5) {
                structuralContent += `
                <div style="margin-bottom: 25px;">
                    <label style="display:block; margin-bottom:5px; color:${textColor}; font-weight:bold;">Random Input Field:</label>
                    <input type="text" placeholder="Type something completely random here..." style="width: 100%; max-width: 400px; padding: 10px; border: 2px solid ${headingColor}; border-radius: 4px;">
                </div>\n`;
            }

            // 1/4 Chance of local MP3 random play button appearing
            if (Math.random() < 0.25) {
                structuralContent += `
                <div style="margin-bottom: 25px; padding: 15px; border: 2px dashed ${headingColor}; background: rgba(255,255,255,0.1); border-radius: 8px; display: inline-block;">
                    <p style="color: ${textColor}; font-size: 0.9rem; margin-bottom: 8px; font-weight: bold;">🎵 Audio Node Trigger Detected</p>
                    <button onclick="requestAudioPlay()" style="background: ${headingColor}; color: #fff; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; text-shadow: 1px 1px 2px #000;">
                        ▶ Play Random MP3
                    </button>
                    <p id="audioStatus" style="font-size:0.8rem; margin-top:5px; color:${textColor}; opacity:0.8;"></p>
                </div>\n`;
            }

            const generatedCode = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>${siteTitle}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: ${mainBg}; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: '${selectedFont}', sans-serif;
            padding: 20px;
        }
        .container { 
            background-color: ${panelBg}; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            max-width: 600px; 
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        ${structuralContent.trim()}
    </div>

    <script>
        function requestAudioPlay() {
            var trackNumber = Math.floor(Math.random() * 10) + 1;
            var trackName = "MP3 " + trackNumber + ".mp3";
            
            document.getElementById('audioStatus').innerText = "Playing: " + trackName;
            
            // Post track request up to parent host page
            window.parent.postMessage({ action: 'play_mp3', file: trackName }, '*');
        }
    <\/script>

</body>
</html>`;

            document.getElementById('codeViewer').value = generatedCode;

            const iframe = document.getElementById('previewWindow');
            iframe.src = "data:text/html;charset=utf-8," + encodeURIComponent(generatedCode);
        }

        // Bridge Listener: Intercepts the iframe trigger and builds a secure web URL link
        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'play_mp3') {
                var player = document.getElementById('masterAudioPlayer');
                
                // If GitHub details are configured, stream from your repository online
                if (GITHUB_USERNAME !== "YOUR_USERNAME") {
                    player.src = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/${encodeURIComponent(event.data.file)}`;
                } else {
                    // Fallback to local link if file is run over a server or in a permissive browser environment
                    player.src = event.data.file;
                }
                
                player.play().catch(function(err) {
                    console.error("Playback failed:", err);
                    alert("Audio blocked or file missing! If running locally from your drive, please configure your GitHub details inside the script.");
                });
            }
        });

        function copyCode() {
            const codeViewer = document.getElementById('codeViewer');
            if(!codeViewer.value) return;
            codeViewer.select();
            navigator.clipboard.writeText(codeViewer.value);
            alert('Code copied to your clipboard!');
        }

        window.onload = generateRandomWebsite;
    </script>
</body>
</html>
