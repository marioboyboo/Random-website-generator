<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pure Random Site Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-color);
        }

        h1 span {
            color: var(--accent-color);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .seed-display {
            background: #020617;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            font-family: monospace;
            font-size: 0.9rem;
            color: #34d399;
            border: 1px solid #334155;
        }

        .seed-input {
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 0.5rem;
            border-radius: 0.375rem;
            width: 110px;
            font-family: monospace;
        }

        .btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #475569;
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
            position: relative;
        }

        .panel:last-child {
            border-right: none;
        }

        .panel-header {
            background-color: #1e293b80;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        textarea {
            width: 100%;
            height: 100%;
            background-color: #020617;
            color: #34d399;
            font-family: 'Courier New', Courier, monospace;
            padding: 1rem;
            border: none;
            resize: none;
            outline: none;
            font-size: 0.9rem;
        }

        #previewCanvas {
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Hostile Volume Container */
        .hostile-slider-box {
            background: rgba(0, 0, 0, 0.4);
            border: 2px dotted #ef4444;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            display: inline-block;
            width: 100%;
            max-width: 320px;
        }

        .hostile-slider-box label {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
            color: #f87171 !important;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .annoying-slider {
            width: 100%;
            cursor: not-allowed;
            accent-color: #ef4444;
        }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; min-height: 100vh; }
            header { flex-direction: column; align-items: stretch; }
            .controls-group { flex-wrap: wrap; justify-content: space-between; }
            .main-container { flex-direction: column; height: auto; overflow: visible; }
            .panel { height: 400px; border-right: none; border-bottom: 3px solid #334155; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Random <span>Site Generator</span></h1>
        
        <div class="controls-group">
            <div>
                <span>Seed: </span>
                <span id="currentSeedDisplay" class="seed-display">------</span>
                <button class="btn-secondary" style="padding: 0.4rem 0.6rem;" onclick="copySeed()">Copy Seed</button>
            </div>
            
            <div>
                <input type="number" id="loadSeedInput" class="seed-input" placeholder="Enter Seed">
                <button class="btn-secondary" style="padding: 0.4rem 0.6rem;" onclick="loadCustomSeed()">Load</button>
            </div>

            <button class="btn" onclick="generateRandomWebsite()">🎲 Generate New Site</button>
        </div>
    </header>

    <div class="main-container">
        <div class="panel">
            <div class="panel-header">
                <span>Source Code (HTML/CSS)</span>
                <button class="btn btn-secondary" onclick="copyCode()">Copy Code</button>
            </div>
            <textarea id="codeViewer" readonly placeholder="Click 'Generate New Site' to build something..."></textarea>
        </div>

        <div class="panel">
            <div class="panel-header">Live Preview</div>
            <div id="previewCanvas"></div>
        </div>
    </div>

    <audio id="masterAudioPlayer" preload="auto" crossorigin="anonymous"></audio>

    <script>
        const words = ["Quantum", "Glitch", "Matrix", "Cyber", "Void", "Omega", "Hyper", "Alpha", "Delta", "Turbo", "Cosmic", "Phantom", "Solar", "Static", "Cryptic"];
        const nouns = ["Portal", "System", "Node", "Network", "Beacon", "Core", "Module", "Vortex", "Grid", "Terminal", "Buffer", "Array", "Engine", "Console"];
        const phrases = [
            "System calibration is currently underway.",
            "Data stream injection has reached maximum capacity.",
            "Welcome to the fallback terminal node.",
            "Unidentified protocols have been successfully initiated.",
            "Processing structural chaos elements..."
        ];
        const fonts = ["Arial", "Courier New", "Impact", "Georgia", "Comic Sans MS"];

        let currentSeed = 1;
        let globalVolumeMultiplier = 1.0; 
        let trackBaseVolume = 1.0;

        // Chaos Slider Physics Variables
        let sliderInterval = null;
        let sliderTime = 0;
        let baseDriftSpeed = 0.05;
        let isUserDraggingSlider = false;

        function seededRandom() {
            currentSeed = (currentSeed * 1664525 + 1013904223) % 4294967296;
            return currentSeed / 4294967296;
        }

        function rand(arr) { return arr[Math.floor(seededRandom() * arr.length)]; }
        function randRange(min, max) { return Math.floor(seededRandom() * (max - min + 1)) + min; }
        function randColor() { return `hsl(${randRange(0, 360)}, ${randRange(50, 95)}%, ${randRange(30, 70)}%)`; }

        let audioCtx = null;
        let gainNode = null;
        let sourceNode = null;

        function initAudioPipeline(player) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                sourceNode = audioCtx.createMediaElementSource(player);
                sourceNode.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Live hardware volume updater combining track properties and annoying slider value
        function updateFinalHardwareVolume() {
            if (gainNode) {
                gainNode.gain.value = trackBaseVolume * globalVolumeMultiplier;
            }
        }

        // Hostile Slider Engine Initialization
        window.startAnnoyingSliderPhysics = function() {
            if (sliderInterval) clearInterval(sliderInterval);
            
            sliderInterval = setInterval(function() {
                var slider = document.getElementById('annoyingVolumeControl');
                var textIndicator = document.getElementById('volumePercentage');
                if (!slider) return;

                sliderTime += baseDriftSpeed;
                
                // If user is actively wrestling the knob, make it vibrate aggressively
                if (isUserDraggingSlider) {
                    let jitter = (Math.sin(sliderTime * 15) * 4);
                    let newVal = Math.max(0, Math.min(100, parseFloat(slider.value) + jitter));
                    slider.value = newVal;
                } else {
                    // If left alone, drift fluidly back and forth like a boat sliding down a wave
                    let drift = (Math.sin(sliderTime * 2) * 1.5) + (Math.cos(sliderTime * 5) * 0.5);
                    let newVal = Math.max(0, Math.min(100, parseFloat(slider.value) + drift));
                    slider.value = newVal;
                }

                globalVolumeMultiplier = parseFloat(slider.value) / 100;
                if (textIndicator) textIndicator.innerText = Math.round(globalVolumeMultiplier * 100) + "%";
                updateFinalHardwareVolume();
            }, 30);
        };

        window.handleSliderGrab = function() {
            isUserDraggingSlider = true;
        };

        window.handleSliderRelease = function() {
            isUserDraggingSlider = false;
            // Randomize speed/direction parameters every single time they let go to destroy muscle memory
            baseDriftSpeed = (Math.random() * 0.15) - 0.075;
            if(baseDriftSpeed === 0) baseDriftSpeed = 0.05;
        };

        window.parentPlayAudio = function() {
            var player = document.getElementById('masterAudioPlayer');
            var status = document.getElementById('audioStatus');
            
            var trackNumber = Math.floor(Math.random() * 10) + 1;
            var trackName = "MP3 " + trackNumber + ".mp3";
            
            initAudioPipeline(player);
            player.loop = false; 

            if (trackNumber === 9) { trackBaseVolume = 2.0; } 
            else { trackBaseVolume = 1.0; }
            
            updateFinalHardwareVolume();
            
            if (status) status.innerText = "Playing: " + trackName;
            
            player.src = trackName;
            player.load(); 
            player.play().catch(function(err) { console.error(err); });
        };

        window.handleTextInputSecret = function(inputVal) {
            var player = document.getElementById('masterAudioPlayer');
            var status = document.getElementById('audioStatus');
            
            var cleanText = inputVal.trim().toLowerCase().replace(/\s+/g, '');
            var match = cleanText.match(/^mp3([1-9]|10)\.mp3$/);

            if (match) {
                var trackNumber = parseInt(match[1]);
                var trackName = "MP3 " + trackNumber + ".mp3";

                initAudioPipeline(player);
                player.loop = true; 

                if (trackNumber === 9) { trackBaseVolume = 2.0; } 
                else { trackBaseVolume = 1.0; }

                updateFinalHardwareVolume();

                if (status) status.innerText = "🔄 Looping: " + trackName;

                if (!player.src.endsWith(encodeURIComponent(trackName))) {
                    player.src = trackName;
                    player.load();
                    player.play().catch(function(err) { console.error("Loop failed:", err); });
                }
            } else if (cleanText === "") {
                player.pause();
                player.loop = false;
                if (status) status.innerText = "";
            }
        };

        function generateRandomWebsite(forcedSeed) {
            var player = document.getElementById('masterAudioPlayer');
            if (player) {
                player.pause();
                player.loop = false;
            }

            if (forcedSeed !== undefined) { currentSeed = forcedSeed; } 
            else { currentSeed = Math.floor(Math.random() * 900000) + 100000; }

            document.getElementById('currentSeedDisplay').innerText = currentSeed;

            const headingColor = randColor();
            const textColor = randColor();
            const panelBg = randColor();
            const mainBg = randColor();
            const selectedFont = rand(fonts);
            const siteTitle = `${rand(words)} ${rand(nouns)}`;
            
            let structuralContent = `
                <h1 style="color: ${headingColor}; font-size: ${randRange(2, 3.5)}rem; margin-bottom: 15px; font-family: '${selectedFont}', sans-serif;">${siteTitle}</h1>
                <p style="color: ${textColor}; font-size: 1.1rem; margin-bottom: 25px; font-family: '${selectedFont}', sans-serif;">${rand(phrases)}</p>
            `;

            structuralContent += `
                <div style="margin-bottom: 20px; font-family: '${selectedFont}', sans-serif;">
                    <p id="audioStatus" style="font-size:1rem; font-weight:bold; color:${textColor}; min-height: 1.2em;"></p>
                </div>\n`;

            if (seededRandom() < 0.5) {
                structuralContent += `
                <div style="margin-bottom: 25px; font-family: '${selectedFont}', sans-serif;">
                    <label style="display:block; margin-bottom:5px; color:${textColor}; font-weight:bold;">Secret Audio Input Field:</label>
                    <input type="text" oninput="window.handleTextInputSecret(this.value)" placeholder="Just type random gibberish in here" style="width: 100%; max-width: 400px; padding: 10px; border: 2px solid ${headingColor}; border-radius: 4px;">
                </div>\n`;
            }

            if (seededRandom() < 0.25) {
                structuralContent += `
                <div style="margin-bottom: 25px; padding: 15px; border: 2px dashed ${headingColor}; background: rgba(255,255,255,0.1); border-radius: 8px; display: inline-block; font-family: '${selectedFont}', sans-serif;">
                    <p style="color: ${textColor}; font-size: 0.9rem; margin-bottom: 8px; font-weight: bold;">🎵 Audio Node Trigger Detected</p>
                    <button onclick="window.parentPlayAudio()" style="background: ${headingColor}; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 4px; text-shadow: 1px 1px 2px #000; font-size: 1rem;">
                        ▶ Play Random MP3
                    </button>
                </div>\n`;
            }

            // ALWAYS append the malicious volume component to the generated card design
            structuralContent += `
            <div class="hostile-slider-box">
                <label>⚠️ WARNING: UNSTABLE VOLUME SYSTEM</label>
                <input type="range" id="annoyingVolumeControl" class="annoying-slider" min="0" max="100" value="50" 
                    onmousedown="window.handleSliderGrab()" 
                    onmouseup="window.handleSliderRelease()"
                    ontouchstart="window.handleSliderGrab()" 
                    ontouchend="window.handleSliderRelease()">
                <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-top:4px; color:${textColor}; font-family:monospace;">
                    <span>Current Power:</span>
                    <span id="volumePercentage" style="font-weight:bold; color:#ef4444;">50%</span>
                </div>
            </div>\n`;

            const textCodeOutput = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>${siteTitle}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: ${mainBg}; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: '${selectedFont}', sans-serif;
            padding: 20px;
        }
        .container { 
            background-color: ${panelBg}; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            max-width: 600px; 
            width: 100%;
            text-align: center;
        }
        .hostile-slider-box {
            background: rgba(0, 0, 0, 0.4);
            border: 2px dotted #ef4444;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            display: inline-block;
            width: 100%;
            max-width: 320px;
        }
        .hostile-slider-box label {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
            color: #f87171 !important;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .annoying-slider { width: 100%; accent-color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        ${structuralContent.trim().replace('oninput="window.handleTextInputSecret(this.value)"', 'oninput="playLocalLoopMP3(this.value)"').replace('onclick="window.parentPlayAudio()"', 'onclick="playRandomLocalMP3()"').replace('onmousedown="window.handleSliderGrab()" onmouseup="window.handleSliderRelease()" ontouchstart="window.handleSliderGrab()" ontouchend="window.handleSliderRelease()"', 'onmousedown="grab()" onmouseup="release()" ontouchstart="grab()" ontouchend="release()"')}
    </div>

    <audio id="localChaosPlayer" crossorigin="anonymous"></audio>
    <script>
        var audioCtx = null, gainNode = null, sourceNode = null;
        var globalVol = 0.5, trackVol = 1.0, sliderTime = 0, driftSpd = 0.05, dragging = false;

        function initAudio(player) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                sourceNode = audioCtx.createMediaElementSource(player);
                sourceNode.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }

        function syncVol() { if(gainNode) gainNode.gain.value = trackVol * globalVol; }

        setInterval(function() {
            var s = document.getElementById('annoyingVolumeControl');
            var txt = document.getElementById('volumePercentage');
            if(!s) return;
            sliderTime += driftSpd;
            if(dragging) {
                s.value = Math.max(0, Math.min(100, parseFloat(s.value) + (Math.sin(sliderTime*15)*4)));
            } else {
                s.value = Math.max(0, Math.min(100, parseFloat(s.value) + (Math.sin(sliderTime*2)*1.5)));
            }
            globalVol = parseFloat(s.value)/100;
            if(txt) txt.innerText = Math.round(globalVol*100) + "%";
            syncVol();
        }, 30);

        function grab() { dragging = true; }
        function release() { dragging = false; driftSpd = (Math.random()*0.15)-0.075; }

        function playRandomLocalMP3() {
            var player = document.getElementById('localChaosPlayer');
            var status = document.getElementById('audioStatus');
            var trackNumber = Math.floor(Math.random() * 10) + 1;
            initAudio(player); player.loop = false;
            trackVol = (trackNumber === 9) ? 2.0 : 1.0; syncVol();
            if (status) status.innerText = "Playing: MP3 " + trackNumber + ".mp3";
            player.src = "MP3 " + trackNumber + ".mp3";
            player.play().catch(function(err) { console.log(err); });
        }

        function playLocalLoopMP3(inputVal) {
            var player = document.getElementById('localChaosPlayer');
            var status = document.getElementById('audioStatus');
            var cleanText = inputVal.trim().toLowerCase().replace(/\\s+/g, '');
            var match = cleanText.match(/^mp3([1-9]|10)\\.mp3$/);
            if (match) {
                var trackNumber = parseInt(match[1]);
                initAudio(player); player.loop = true;
                trackVol = (trackNumber === 9) ? 2.0 : 1.0; syncVol();
                if (status) status.innerText = "🔄 Looping: MP3 " + trackNumber + ".mp3";
                if (!player.src.endsWith(encodeURIComponent("MP3 " + trackNumber + ".mp3"))) {
                    player.src = "MP3 " + trackNumber + ".mp3"; player.play().catch(function(err) { console.log(err); });
                }
            } else if (cleanText === "") {
                player.pause(); player.loop = false; if (status) status.innerText = "";
            }
        }
    <\/script>
</body>
</html>`;

            document.getElementById('codeViewer').value = textCodeOutput;

            const canvas = document.getElementById('previewCanvas');
            canvas.style.backgroundColor = mainBg;
            canvas.innerHTML = `
                <div style="background-color: ${panelBg}; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-width: 600px; width: 100%; text-align: center;">
                    ${structuralContent.trim()}
                </div>
            `;

            // Spin up the visual background loop inside the main application canvas frame
            window.startAnnoyingSliderPhysics();
        }

        function copySeed() {
            const seedTxt = document.getElementById('currentSeedDisplay').innerText;
            navigator.clipboard.writeText(seedTxt);
            alert('Seed copied: ' + seedTxt);
        }

        function loadCustomSeed() {
            const inputVal = document.getElementById('loadSeedInput').value;
            if(!inputVal) return;
            generateRandomWebsite(parseInt(inputVal));
        }

        function copyCode() {
            const codeViewer = document.getElementById('codeViewer');
            if(!codeViewer.value) return;
            codeViewer.select();
            navigator.clipboard.writeText(codeViewer.value);
            alert('Code copied!');
        }

        window.onload = function() {
            generateRandomWebsite();
        };
    </script>
</body>
</html>
