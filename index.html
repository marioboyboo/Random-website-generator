<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pure Random Site Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-color);
        }

        h1 span {
            color: var(--accent-color);
        }

        .btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #475569;
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
            position: relative;
        }

        .panel:last-child {
            border-right: none;
        }

        .panel-header {
            background-color: #1e293b80;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        textarea {
            width: 100%;
            height: 100%;
            background-color: #020617;
            color: #34d399;
            font-family: 'Courier New', Courier, monospace;
            padding: 1rem;
            border: none;
            resize: none;
            outline: none;
            font-size: 0.9rem;
        }

        #previewCanvas {
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Mobile Responsive Layout Split */
        @media (max-width: 768px) {
            body { overflow: auto; height: auto; min-height: 100vh; }
            .main-container { flex-direction: column; height: auto; overflow: visible; }
            .panel { height: 400px; border-right: none; border-bottom: 3px solid #334155; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Random <span>Site Generator</span></h1>
        <button class="btn" onclick="generateRandomWebsite()">🎲 Generate New Site</button>
    </header>

    <div class="main-container">
        <div class="panel">
            <div class="panel-header">
                <span>Source Code (HTML/CSS)</span>
                <button class="btn btn-secondary" onclick="copyCode()">Copy Code</button>
            </div>
            <textarea id="codeViewer" readonly placeholder="Click 'Generate New Site' to build something..."></textarea>
        </div>

        <div class="panel">
            <div class="panel-header">Live Preview</div>
            <div id="previewCanvas"></div>
        </div>
    </div>

    <audio id="masterAudioPlayer" preload="auto"></audio>

    <script>
        const words = ["Quantum", "Glitch", "Matrix", "Cyber", "Void", "Omega", "Hyper", "Alpha", "Delta", "Turbo", "Cosmic", "Phantom", "Solar", "Static", "Cryptic"];
        const nouns = ["Portal", "System", "Node", "Network", "Beacon", "Core", "Module", "Vortex", "Grid", "Terminal", "Buffer", "Array", "Engine", "Console"];
        const phrases = [
            "System calibration is currently underway.",
            "Data stream injection has reached maximum capacity.",
            "Welcome to the fallback terminal node.",
            "Unidentified protocols have been successfully initiated.",
            "Processing structural chaos elements..."
        ];
        const fonts = ["Arial", "Courier New", "Impact", "Georgia", "Comic Sans MS"];

        function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function randRange(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function randColor() { return `hsl(${randRange(0, 360)}, ${randRange(50, 95)}%, ${randRange(30, 70)}%)`; }

        // Global function directly available to the live preview canvas buttons
        // FIX: Directly executes inside the user's tap timeline to clear Android security walls
        window.parentPlayAudio = function() {
            var player = document.getElementById('masterAudioPlayer');
            var status = document.getElementById('audioStatus');
            
            var trackNumber = Math.floor(Math.random() * 10) + 1;
            var trackName = "MP3 " + trackNumber + ".mp3";
            
            if (status) status.innerText = "Playing: " + trackName;
            
            player.src = trackName;
            
            // Explicitly call load() to force mobile data pipes open
            player.load(); 
            
            var playPromise = player.play();
            if (playPromise !== undefined) {
                playPromise.catch(function(err) {
                    if (status) status.innerText = "Tap again to play audio!";
                    console.error("Android playback issue:", err);
                });
            }
        };

        function generateRandomWebsite() {
            const headingColor = randColor();
            const textColor = randColor();
            const panelBg = randColor();
            const mainBg = randColor();
            const selectedFont = rand(fonts);
            const siteTitle = `${rand(words)} ${rand(nouns)}`;
            
            let structuralContent = `
                <h1 style="color: ${headingColor}; font-size: ${randRange(2, 3.5)}rem; margin-bottom: 15px; font-family: '${selectedFont}', sans-serif;">${siteTitle}</h1>
                <p style="color: ${textColor}; font-size: 1.1rem; margin-bottom: 25px; font-family: '${selectedFont}', sans-serif;">${rand(phrases)}</p>
            `;

            if (Math.random() < 0.5) {
                structuralContent += `
                <div style="margin-bottom: 25px; font-family: '${selectedFont}', sans-serif;">
                    <label style="display:block; margin-bottom:5px; color:${textColor}; font-weight:bold;">Random Input Field:</label>
                    <input type="text" placeholder="Type something completely random here..." style="width: 100%; max-width: 400px; padding: 10px; border: 2px solid ${headingColor}; border-radius: 4px;">
                </div>\n`;
            }

            if (Math.random() < 0.25) {
                structuralContent += `
                <div style="margin-bottom: 25px; padding: 15px; border: 2px dashed ${headingColor}; background: rgba(255,255,255,0.1); border-radius: 8px; display: inline-block; font-family: '${selectedFont}', sans-serif;">
                    <p style="color: ${textColor}; font-size: 0.9rem; margin-bottom: 8px; font-weight: bold;">🎵 Audio Node Trigger Detected</p>
                    <button onclick="window.parentPlayAudio()" style="background: ${headingColor}; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 4px; text-shadow: 1px 1px 2px #000; font-size: 1rem;">
                        ▶ Play Random MP3
                    </button>
                    <p id="audioStatus" style="font-size:0.8rem; margin-top:5px; color:${textColor}; opacity:0.8;"></p>
                </div>\n`;
            }

            const textCodeOutput = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>${siteTitle}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: ${mainBg}; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: '${selectedFont}', sans-serif;
            padding: 20px;
        }
        .container { 
            background-color: ${panelBg}; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            max-width: 600px; 
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        ${structuralContent.trim().replace('onclick="window.parentPlayAudio()"', 'onclick="playRandomLocalMP3()"')}
    </div>

    <audio id="localChaosPlayer"></audio>
    <script>
        function playRandomLocalMP3() {
            var player = document.getElementById('localChaosPlayer');
            var status = document.getElementById('audioStatus');
            var trackNumber = Math.floor(Math.random() * 10) + 1;
            var targetTrackName = "MP3 " + trackNumber + ".mp3";
            status.innerText = "Playing: " + targetTrackName;
            player.src = targetTrackName;
            player.play().catch(function(err) { console.log(err); });
        }
    <\/script>
</body>
</html>`;

            document.getElementById('codeViewer').value = textCodeOutput;

            const canvas = document.getElementById('previewCanvas');
            canvas.style.backgroundColor = mainBg;
            canvas.innerHTML = `
                <div style="background-color: ${panelBg}; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-width: 600px; width: 100%; text-align: center;">
                    ${structuralContent.trim()}
                </div>
            `;
        }

        function copyCode() {
            const codeViewer = document.getElementById('codeViewer');
            if(!codeViewer.value) return;
            codeViewer.select();
            navigator.clipboard.writeText(codeViewer.value);
            alert('Code copied!');
        }

        window.onload = generateRandomWebsite;
    </script>
</body>
</html>
